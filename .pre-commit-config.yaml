repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uvx ruff check
        language: system
        pass_filenames: true
        types: [python]

      - id: ruff-format-check
        name: ruff-format-check
        entry: uvx ruff format --check
        language: system
        pass_filenames: true
        types: [python]

      - id: ty-check
        name: ty-check
        entry: uvx ty check
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
