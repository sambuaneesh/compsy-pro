<h1 id="core-research-problem">Core Research Problem</h1>
<p>Language models achieve strong task performance, but:</p>
<ul>
<li>It is unclear whether internal representations encode structural linguistic meaning.</li>
<li>Small counterfactual edits can radically alter meaning for humans.</li>
<li>Output-level correctness alone does not reveal representational geometry.</li>
</ul>
<p>Key question:</p>
<p>Do hidden-state shifts under minimal linguistic edits align with human semantic-change judgments?</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="6" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="why-counterfactual-minimal-edits">Why Counterfactual Minimal Edits?</h1>
<p>Minimal edit protocols isolate structural changes while limiting lexical confounds.</p>
<p>Primary phenomena:</p>
<ul>
<li>Role reversal (agent/patient swap).</li>
<li>Negation insertion/removal.</li>
<li>Attachment disambiguation.</li>
</ul>
<p>Examples:</p>
<ul>
<li>Role: “The driver ignored the passenger.” <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> “The passenger ignored the driver.”</li>
<li>Negation: “The writer interviewed the coach.” <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> “The writer did not interview the coach.”</li>
<li>Attachment: “With the microscope, ...” <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> “... who had the microscope.”</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="scientific-claim-boundary-strict">Scientific Claim Boundary (Strict)</h1>
<p>Primary claim:</p>
<ul>
<li>Some layer-wise representation shifts may align with human semantic-change ratings.</li>
</ul>
<p>Explicit non-claim:</p>
<ul>
<li>This project does not claim language models process language like humans.</li>
<li>No reading-time or neuro data were collected; this is semantic-judgment alignment only.</li>
</ul>
<p>(Ettinger, 2020; Lee et al., 2024 motivate this caution.)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">

Human-Aligned Probing of Language Model Representations under Minimal Linguistic Edits</p>

<ul>

</ul>
</section>

<p>[<br />
\text{sentence} \rightarrow \text{counterfactual edit} \rightarrow \text{hidden states} \rightarrow \text{representation shifts} \rightarrow \text{probes + surprisal} \rightarrow \text{human alignment}<br />
]</p>
<p>Repository non-negotiable:</p>
<ul>
<li>This pipeline was preserved throughout all phases.</li>
<li>No pivot to unrelated objectives.</li>
</ul>
<p>Source: <code>AGENTS.md</code></p>

<h1 id="hypotheses-h1-h5">Hypotheses (H1-H5)</h1>
<ul>
<li><strong>H1 Human-aligned shift</strong>: Larger representation shifts correlate with larger human 0-5 change scores.</li>
<li><strong>H2 Frobenius complementarity</strong>: Matrix-norm shift adds explanatory value beyond centroid cosine.</li>
<li><strong>H3 Phenomenon-specific layer profiles</strong>: Role/negation/attachment peak differently by layer.</li>
<li><strong>H4 Surprisal complementarity</strong>: GPT-2 surprisal contributes but does not replace representation metrics.</li>
<li><strong>H5 Control robustness</strong>: Effects should survive controls (length, overlap, split controls, selectivity).</li>
</ul>
<p>Source: <code>PROJECT_RESEARCH_PLAN.md</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="11" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="novelty-statement">Novelty Statement</h1>
<p>Not novel:</p>
<ul>
<li>Minimal pairs per se (BLiMP already established broad minimal-pair evaluation; Warstadt et al., 2020).</li>
</ul>
<p>Novel combination here:</p>
<ul>
<li>Counterfactual minimal edits + layer-wise hidden shifts + matrix-norm adaptation + human change ratings + selectivity-controlled probes + surprisal covariates.</li>
</ul>
</section>

<h1 id="model-choices-primary">Model Choices (Primary)</h1>
<p>Exactly three primary models:</p>
<ul>
<li><code>bert-base-uncased</code> (Devlin et al., 2019)</li>
<li><code>roberta-base</code> (Liu et al., 2019)</li>
<li><code>gpt2</code> (Radford et al., 2019)</li>
</ul>
<p>Rationale:</p>
<ul>
<li>Bidirectional encoder baseline (BERT family).</li>
<li>Strong optimized BERT-family variant (RoBERTa).</li>
<li>Autoregressive model for canonical surprisal (GPT-2).</li>
</ul>

<h1 id="metric-definitions-cosine-shift">Metric Definitions: Cosine Shift</h1>
<p>Cosine similarity:</p>
<p>[<br />
\cos(\mathbf{a},\mathbf{b}) = \frac{\mathbf{a}\cdot\mathbf{b}}{|\mathbf{a}||\mathbf{b}|+\epsilon}<br />
]</p>
<p>Shift:</p>
<p>[<br />
\Delta_{\cos} = 1 - \cos(\mathbf{a},\mathbf{b})<br />
]</p>
<p>Implementation: <code>src/css/metrics/cosine.py</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="41" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="metric-definitions-frobenius-similarity-adapted">Metric Definitions: Frobenius Similarity (Adapted)</h1>
<p>Given word matrices (A \in \mathbb{R}^{m \times d}), (B \in \mathbb{R}^{n \times d}):</p>
<ol>
<li>Optional row L2 normalization.</li>
<li>Similarity matrices:
<ul>
<li>(S_{\times} = \max(0, AB^\top)) if clipping on.</li>
<li>(S_A = \max(0, AA^\top))</li>
<li>(S_B = \max(0, BB^\top))</li>
</ul>
</li>
<li>Frobenius similarity:</li>
</ol>
<p>[<br />
\text{sim}<em>{\text{frob}} = \frac{|S</em>{\times}|_F}{\sqrt{|S_A|_F|S_B|_F+\epsilon}}<br />
]</p>
<p>[<br />
\Delta_{\text{frob}} = 1 - \text{sim}_{\text{frob}}<br />
]</p>
<p>Implementation: <code>src/css/metrics/matrix_norms.py</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="42" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="metric-definitions-l2-and-token-aligned-shift">Metric Definitions: L2 and Token-Aligned Shift</h1>
<p>Sentence-level L2 shift:</p>
<p>[<br />
\Delta_{L2} = |\mu(s)-\mu(s')|_2<br />
]</p>
<p>Token-aligned shift:</p>
<ul>
<li>align words by exact lexical match (fallback positional).</li>
<li>average token-wise cosine shifts:</li>
</ul>
<p>[<br />
\Delta_{\text{tok}} = \frac{1}{|M|}\sum_{(i,j)\in M}\left(1-\cos(h_i,h'_j)\right)<br />
]</p>
<p>Implementation: <code>src/css/metrics/token_shift.py</code></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="43" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="metric-computation-engine">Metric Computation Engine</h1>
<p>Module:</p>
<ul>
<li><code>src/css/metrics/compute_all_metrics.py</code></li>
</ul>
<p>Per record writes:</p>
<ul>

<h1 id="surprisal-theory">Surprisal Theory</h1>
<p>Autoregressive surprisal (Levy, 2008):</p>
<p>[<br />
\text{surprisal}(w_i) = -\log P(w_i \mid w_{&lt;i})<br />
]</p>
<p>Project choice:</p>
<ul>
<li>GPT-2 autoregressive scoring is primary.</li>
<li>MLM pseudo-log-likelihood is secondary/optional (Salazar et al., 2020).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="49" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">

]</p>
<p>Reference motivation: Hewitt &amp; Liang (2019)</p>

<ol>

<ul>
<li>builder uses <code>gold.get(f&quot;attachment_{side}&quot;)</code> with <code>side in {s, s_cf}</code></li>

<li>only <code>attachment_s</code> seen; ambiguous labels dropped; VP-only subset survives.</li>
</ul>
<ol start="2">
<li>GPT-2 role single-class:</li>

</ul>

<li><code>src/css/salience/token_contributions.py</code></li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="71" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="salience-scoring-components">Salience Scoring Components</h1>
<p>Per token:</p>
<ul>
<li>cross-matrix contribution (row/column sum of (AB^\top))</li>
<li>leave-one-out Frobenius drop</li>
</ul>
<p>Combined score:</p>
<p>[<br />
\text{salience} = 0.5 \cdot \text{cross_contrib} + 0.5 \cdot \text{loo_drop}<br />
]</p>
<p>Normalized to probability-like per-side token scores.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="72" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="salience-layer-selection">Salience Layer Selection</h1>
<p>Operational choice:</p>
<ul>
<li>Use layer with highest mean <code>delta_frob</code> per model × phenomenon.</li>
</ul>
<p>Source:</p>
<ul>
<li>derived from <code>results/metrics/layer_metrics_full.csv</code></li>
</ul>
<p>This keeps salience tied to phenomenon/model-specific sensitivity peaks.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="73" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="salience-robustness-patch">Salience Robustness Patch</h1>
<p>Observed issue:</p>
<ul>
<li>GPT-2 had mismatched <code>len(words)</code> vs matrix rows due offset-word alignment behavior.</li>
</ul>
<p>Patch behavior:</p>
<ul>
<li>truncate words/spans to matrix row count</li>
<li>pad fallback token names when needed</li>
<li>proceed with safe indexing</li>
</ul>
<p>Result:</p>
<ul>
<li>salience full run completed without index failures.</li>
</ul>
</section>

<h1 id="why-correlation-signals-are-weak-here">Why Correlation Signals Are Weak Here</h1>
<p>Primary reason:</p>
<ul>
<li>Annotation targets are synthetic fallback, not real human judgments.</li>
</ul>
<p>Likely secondary contributors:</p>
<ul>
<li>Probe extraction bug (<code>*_s_cf</code> key mismatch).</li>
<li>GPT-2 word alignment limitations for span-sensitive probing.</li>
<li>templated data simplicity and random splits.</li>
</ul>
<p>Conclusion:</p>
<ul>
<li>Do not interpret these numbers as final scientific findings.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="84" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="high-impact-fixes-needed-before-paper-claims">High-Impact Fixes Needed Before Paper Claims</h1>
<ol>
<li>Replace simulated annotations with real human collection (&gt;=300 balanced).</li>
<li>Fix probe label keying for <code>negation_cf</code> and <code>attachment_cf</code>.</li>
<li>Harden GPT-2 word/span mapping in extraction for role probes.</li>
<li>Re-run probes under lexical/template split controls.</li>
<li>Recompute full stats and figures with corrected inputs.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="85" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="probe-bug-detail-key-naming">Probe Bug Detail: Key Naming</h1>
<p>Current probe code pattern:</p>
<ul>
<li><code>gold.get(f&quot;negation_{side}&quot;)</code></li>
<li><code>gold.get(f&quot;attachment_{side}&quot;)</code></li>
<li>where <code>side</code> is <code>s</code> or <code>s_cf</code></li>
</ul>
<p>Expected gold keys:</p>
<ul>
<li><code>negation_s</code>, <code>negation_cf</code></li>
<li><code>attachment_s</code>, <code>attachment_cf</code></li>
</ul>
<p>Issue:</p>
<ul>
<li><code>*_s_cf</code> does not exist; counterfactual side labels are dropped.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="86" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="probe-bug-detail-consequence">Probe Bug Detail: Consequence</h1>
<p>Attachment consequence:</p>
<ul>
<li>only <code>attachment_s</code> used</li>
<li>many <code>s</code> labels are <code>ambiguous</code> and filtered out</li>
<li>remaining class mostly VP -&gt; single-class training (skip)</li>
</ul>
<p>Negation consequence:</p>
<ul>
<li>only <code>negation_s</code> used</li>
<li>still two classes because generator alternates insertion/removal in original side</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="87" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="gpt-2-span-alignment-issue">GPT-2 Span Alignment Issue</h1>
<p>Observation:</p>
<ul>
<li>GPT-2 caches often had fewer word vectors than words.</li>
</ul>
<p>Detected pattern:</p>
<ul>
<li>role/neg/attach GPT-2 layer matrices had row counts (e.g., 2-3) for sentences with 5-9 words.</li>
</ul>
<p>Impact:</p>
<ul>
<li>role probe span indexing under-represents expected spans/classes.</li>
<li>salience required truncation-safe handling.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="88" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
<h1 id="mixed-effects-vs-planned-formula">Mixed-Effects vs Planned Formula</h1>
<p>Plan intended random intercepts for both item and annotator with rich model structure.</p>
<p>Implemented:</p>
<ul>
<li>random intercept by pair + annotator variance component.</li>
</ul>
<p>This is acceptable operationally, but final paper should:</p>
<ul>
<li>report exact fitted structure,</li>
<li>justify any deviations from pre-plan,</li>
<li>and optionally replicate in R <code>lme4</code> for cross-check.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="default" lang="C" data-marpit-pagination="89" style="--paginate:true;--theme:default;" data-marpit-pagination-total="121" data-size="16:9">
